<!DOCTYPE html><html lang=zh><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1.0"><title>CEDAR AI</title><script src=https://unpkg.com/vue@3/dist/vue.global.prod.js></script><style>:root{--bg:#0a0f1a;--card:#111827;--border:#1f2937;--fg:#f3f4f6;--muted:#6b7280;--primary:#818cf8}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--fg);font:14px system-ui,sans-serif;display:flex;min-height:100vh}.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:0;height:100vh}.logo{font-size:18px;font-weight:700;color:var(--primary);padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:20px}.nav-item{padding:12px 20px;cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:10px;transition:all 0.2s;border-left:3px solid transparent}.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--fg)}.nav-item.active{background:rgba(99,102,241,0.1);color:var(--primary);border-left-color:var(--primary)}.nav-num{width:24px;height:24px;background:rgba(99,102,241,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}.main{flex:1;padding:30px 40px;overflow-y:auto}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.header h1{font-size:20px;font-weight:700}.status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}.dot{width:8px;height:8px;background:#34d399;border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}.ct{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}.score-big{font-size:56px;font-weight:700;color:var(--primary);line-height:1}.badge{display:inline-block;padding:4px 12px;border-radius:10px;font-size:11px;font-weight:700}.badge-cool{background:rgba(110,231,183,.15);color:#6ee7b7}.badge-warm{background:rgba(250,204,21,.15);color:#facc15}.badge-hot{background:rgba(248,113,113,.15);color:#f87171}.badge-cold{background:rgba(52,211,153,.15);color:#34d399}.gauge{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:16px}.gfill{height:100%;border-radius:4px;transition:width 0.5s;background:linear-gradient(90deg,#6ee7b7,#818cf8)}.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}.kv{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;min-width:160px;flex:1;text-align:center;position:relative;overflow:hidden}.kv::before{content:\;position:absolute;top:0;left:0;right:0;height:3px}.kv.hot::before{background:#f87171}.kv.warm::before{background:#facc15}.kv.cool::before{background:#6ee7b7}.kv.cold::before{background:#34d399}.kv-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block}.kv-val{font-size:24px;font-weight:700;color:#f3f4f6}.kv-sub{font-size:11px;color:var(--muted);margin-top:4px}.loading{text-align:center;padding:60px;color:var(--muted);font-size:16px}.hist-wrap{display:flex;align-items:flex-end;height:80px;gap:6px;padding-bottom:8px}.flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}.sub-text{font-size:12px;color:var(--muted);margin-top:6px}.empty{text-align:center;padding:40px;color:var(--muted)}</style></head><body><div id=app><aside class=sidebar><div class="logo">CEDAR AI</div><div class="nav-item" :class="{active:page==='market'}" @click="page='market'"><span class="nav-num">6</span> 市场温度</div><div class="nav-item" :class="{active:page==='sector'}" @click="page='sector'"><span class="nav-num">2</span> 板块评分</div><div class="nav-item" :class="{active:page==='growth'}" @click="page='growth'"><span class="nav-num">3</span> 成长评分</div><div class="nav-item" :class="{active:page==='valuation'}" @click="page='valuation'"><span class="nav-num">4</span> 估值评分</div><div class="nav-item" :class="{active:page==='risk'}" @click="page='risk'"><span class="nav-num">5</span> 风险评级</div></aside><main class=main><div class=header><h1>A股市场温度</h1><div class=status><span class=dot></span><span>实时数据 · 每5分钟更新</span></div></div><div v-if=loading class=loading>加载中...</div><template v-else><template v-if=page==="market"><div class="card"><div class="ct">综合评分 - 沪深300</div><div class="flex items-center gap-8"><span class="score-big">{{score}}</span><span class="badge" :class="badgeClass">{{label}}</span></div><div class="sub-text">{{subText}}</div><div class="gauge"><div class="gfill" :style="{width:score+'%'}"></div></div></div><div class="ct">六项指标</div><div class="row" v-html="kvCards"></div><div class="ct">历史30天</div><div class="card"><div class="hist-wrap" v-html="histBars"></div></div></template><template v-if=page==="sector"><div class="card"><div class="ct">板块评分</div><div class="empty">申万行业数据加载中...</div></div></template><template v-if=page==="growth"><div class="card"><div class="ct">成长评分</div><div class="empty">营收/利润增速数据加载中...</div></div></template><template v-if=page==="valuation"><div class="card"><div class="ct">估值评分</div><div class="empty">PE/PB估值数据加载中...</div></div></template><template v-if=page==="risk"><div class="card"><div class="ct">风险评级</div><div class="empty">Beta/波动率数据加载中...</div></div></template></template></main></div><script>const{createApp:ca,ref:r,onMounted:om}=Vue;ca({setup(){const page=r("market");const loading=r(true);const score=r(0);const label=r("Cool");const subText=r("");const badgeClass=r("badge-cool");const kvCards=r("");const histBars=r("");const getBadge=s=>s>=75?"badge-hot":s>=65?"badge-warm":s>=50?"badge-cool":"badge-cold";om(async()=>{try{const res=await fetch("/api/market_temp");const json=await res.json();if(json.success){score.value=json.data.score;label.value=json.data.label;badgeClass.value=getBadge(json.data.score);const ind=json.data.indicators;const details2=[{name:ind[0].name,value:ind[0].value,score:ind[0].score,flag:ind[0].flag},{name:ind[1].name,value:ind[1].value,score:ind[1].score,flag:ind[1].flag},{name:ind[2].name,value:ind[2].value,score:ind[2].score,flag:ind[2].flag},{name:ind[3].name,value:ind[3].value,score:ind[3].score,flag:ind[3].flag},{name:ind[4].name,value:ind[4].value,score:ind[4].score,flag:ind[4].flag},{name:ind[5].name,value:ind[5].value,score:ind[5].score,flag:ind[5].flag}];function gc2(s){return s>=65?"hot":s>=50?"cool":"cold";}function gb2(s){return s>=75?"badge-hot":s>=65?"badge-warm":s>=50?"badge-cool":"badge-cold";}function gl2(s){return s>=75?"HOT":s>=65?"WARM":s>=50?"COOL":"COLD";}function vc2(s){return s>=65?"#f87171":"#6ee7b7";}kvCards.value=details2.map(i=>"<div class=kv "+gc2(i.score)+"><span class=kv-label>"+i.name+"</span><div class=kv-val style=color:"+vc2(i.score)+">"+i.value+"</div><div class=kv-sub><span class=badge "+gb2(i.score)+">"+gl2(i.score)+"</span> "+i.flag+"</div></div>").join("");const history=[55,58,60,57,59,61,58,56,60,62,59,57,63,65,62,59,58,60,57,55,59,62,65,63,60,58,57,59,61,59];histBars.value=history.map(s=>{const c=s>=75?"#f87171":s>=65?"#facc15":s>=50?"#6ee7b7":"#34d399";const l=s>=75?"Hot":s>=65?"Warm":s>=50?"Cool":"Cold";return "<div style=flex:1;display:flex;flex-direction:column;align-items:center;gap:2px><div style=height:"+Math.round(s*0.8)+"px;width:100%;background:"+c+";border-radius:3px 3px 0 0;opacity:0.5></div><div style=font-size:9px;color:#6b7280>"+l+"</div></div>";}).join("");subText.value="波动率:"+json.data.csi300.realizedVol+"% | 汇率:"+json.data.fx.usdCny+" | 利差:"+json.data.shibor.spread+"%";}else{loading.value=false;}}catch(e){loading.value=false;}finally{loading.value=false;}});return{page,loading,score,label,subText,badgeClass,kvCards,histBars,getBadge};}}).mount("#app");</script></body></html>
